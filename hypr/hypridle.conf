general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on monitor
}

listener {
    timeout = 300                                # 5 minutes
    on-timeout = flipclock                       # start flipclock (default is fullscreen)
    on-resume = pkill flipclock                  # kill flipclock on activity
}
